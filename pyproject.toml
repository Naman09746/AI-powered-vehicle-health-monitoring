[tool.ruff]
target-version = "py312"
line-length = 88
exclude = [
    ".venv",
    ".ruff_cache",
    ".pytest_cache",
    "__pycache__",
    "migrations",
    "data",
    "models",
    "_archive",
    "*.ipynb",
    "node_modules",
    "frontend/node_modules",
]

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP", "B", "SIM"]
ignore = ["N803", "N806", "B008", "E402", "E501", "B007", "B904", "SIM102", "N802", "E741"]

[tool.ruff.lint.per-file-ignores]
"migrations/*" = ["ALL"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"

[tool.mypy]
ignore_missing_imports = true
python_version = "3.12"
exclude = [
    "migrations/",
    ".venv/",
]
